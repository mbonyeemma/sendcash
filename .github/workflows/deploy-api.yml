name: Deploy API

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            embonye/send-cash:latest
            embonye/send-cash:${{ github.sha }}

      - name: Deploy to server
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          REMOTE="${REMOTE_PATH:-/home/ec2-user/apps/sendcash}"

          sudo apt-get update && sudo apt-get install -y sshpass rsync

          export SSHPASS="$SERVER_PASSWORD"

          sshpass -e ssh -o StrictHostKeyChecking=no -p 22 \
            "$SERVER_USER@$SERVER_HOST" \
            "mkdir -p $REMOTE"

          rsync -avz \
            -e "sshpass -e ssh -o StrictHostKeyChecking=no -p 22" \
            api/docker-compose.prod.yml \
            "$SERVER_USER@$SERVER_HOST:$REMOTE/docker-compose.yml"

          sshpass -e ssh -o StrictHostKeyChecking=no -p 22 \
            "$SERVER_USER@$SERVER_HOST" \
            "cd $REMOTE && echo $DOCKERHUB_TOKEN | docker login -u $DOCKERHUB_USERNAME --password-stdin && docker-compose pull && docker-compose up -d"
